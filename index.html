<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>현대모비스 설치현황 관리</title>
<link rel="stylesheet" href="css/style.css?v=20260711-4">
</head>
<body>

<header class="topbar">
  <h1>현대모비스 설치현황 관리</h1>
  <div id="identity-badge" class="identity-badge">불러오는 중...</div>
</header>

<main id="dashboard-view">
  <section class="summary">
    <div class="stat-card"><span id="stat-total">-</span><label>전체 사업장</label></div>
    <div class="stat-card"><span id="stat-done">-</span><label>완료</label></div>
    <div class="stat-card accent"><span id="stat-percent">-</span><label>완료율</label></div>
  </section>

  <section id="group-stats" class="group-summary"></section>

  <section class="toolbar">
    <input id="search-input" type="text" placeholder="사업장명 또는 설치업체명 검색">
    <select id="filter-status">
      <option value="">전체 상태</option>
      <option value="미착수">미착수</option>
      <option value="설치예정">설치예정</option>
      <option value="완료">완료</option>
    </select>
    <select id="filter-group">
      <option value="">전체 담당업체</option>
    </select>
    <select id="filter-installer">
      <option value="">전체 설치업체</option>
    </select>
    <button id="export-csv-btn" class="secondary hidden">CSV 내보내기</button>
  </section>

  <section id="sites-table-wrap">
    <table id="sites-table">
      <thead>
        <tr>
          <th>번호</th>
          <th>담당업체</th>
          <th>사업장</th>
          <th>설치업체</th>
          <th>상태</th>
          <th>GST-502(예정/실제)</th>
          <th>GX-8200(예정/실제)</th>
          <th>GX-8200 TCP/IP(예정/실제)</th>
          <th>설치일 <button id="sort-install-date" class="sort-btn" title="설치일 빠른순 정렬">↕</button></th>
          <th>최종수정</th>
        </tr>
      </thead>
      <tbody id="sites-tbody">
        <tr class="empty-row"><td colspan="10">불러오는 중...</td></tr>
      </tbody>
      <tfoot>
        <tr>
          <td colspan="5" class="tfoot-label">합계 (조회된 <span id="tfoot-count">0</span>개 사업장)</td>
          <td id="tfoot-a"></td>
          <td id="tfoot-b"></td>
          <td id="tfoot-c"></td>
          <td colspan="2"></td>
        </tr>
      </tfoot>
    </table>
  </section>
</main>

<div id="detail-modal" class="modal hidden">
  <div class="modal-content">
    <button id="modal-close" class="modal-close" aria-label="닫기">×</button>
    <h2 id="detail-title"></h2>
    <div id="detail-site-info" class="site-info"></div>
    <div id="detail-readonly-notice" class="readonly-notice hidden">조회 전용입니다 (담당 설치업체가 아닙니다)</div>

    <div class="detail-grid">
      <label>담당업체
        <select id="f-group">
          <option value="">미배정</option>
        </select>
      </label>
      <label>설치업체
        <select id="f-installer">
          <option value="">미배정</option>
        </select>
      </label>
      <label>완료여부
        <select id="f-status">
          <option value="미착수">미착수</option>
          <option value="설치예정">설치예정</option>
          <option value="완료">완료</option>
        </select>
      </label>
      <label>설치일
        <input type="date" id="f-install-date">
      </label>
      <label class="full">비고
        <textarea id="f-note" placeholder="특이사항 등"></textarea>
      </label>
    </div>
    <hr>
    <h3>품목별 현황</h3>
    <table class="product-table">
      <thead><tr><th>품목</th><th>예정수량</th><th>실제수량</th></tr></thead>
      <tbody id="product-tbody"></tbody>
    </table>

    <div class="network-units-section">
      <h3>GX-8200 설치위치</h3>
      <div id="b-units-list"></div>
    </div>

    <div class="network-units-section">
      <h3>GX-8200 TCP/IP 설치위치·네트워크 정보</h3>
      <p id="c-removal-notice" class="removal-notice hidden"></p>
      <div id="c-units-list"></div>
    </div>

    <p class="meta" id="detail-meta"></p>

    <div class="modal-save-bar">
      <button id="save-all-btn">저장</button>
      <p id="save-all-msg" class="save-msg"></p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js?v=20260711-4"></script>
<script src="js/app.js?v=20260711-4"></script>
</body>
</html>
